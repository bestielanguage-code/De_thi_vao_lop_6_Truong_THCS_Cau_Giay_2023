<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Hot Pot Party - Cầu Giấy 2023</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap");

      :root {
        --manhwa-pink: #fff1f1;
        --hotpot-red: #ff5e5e;
        --hotpot-gold: #ffcc33;
        --pot-border: #334155;
        --text-main: #2d3436;
      }

      body {
        font-family: "Quicksand", sans-serif;
        background-color: #fffafb;
        color: var(--text-main);
        overflow-x: hidden;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.98);
        border-radius: 40px;
        border: 4px solid #fff;
        box-shadow: 0 20px 50px rgba(255, 94, 94, 0.08);
      }

      .answer-btn {
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 2px solid #fff1f1;
        background: white;
        border-radius: 25px;
      }
      .answer-btn:hover:not(:disabled) {
        transform: scale(1.02);
        border-color: #ff9a8b;
        background-color: #fff9f9;
      }
      .correct {
        background-color: #d1fae5 !important;
        color: #065f46 !important;
        border-color: #34d399 !important;
      }
      .wrong {
        background-color: #fee2e2 !important;
        color: #991b1b !important;
        border-color: #f87171 !important;
      }

      /* Writing Input */
      .writing-input {
        width: 100%;
        padding: 1.5rem;
        border-radius: 25px;
        border: 3px dashed #ffb7b7;
        background: #fffafa;
        font-size: 1.25rem;
        font-weight: 600;
        outline: none;
        transition: all 0.3s;
      }
      .writing-input:focus {
        border-style: solid;
        border-color: var(--hotpot-red);
        box-shadow: 0 0 15px rgba(255, 94, 94, 0.1);
      }
      .writing-input:disabled {
        background: #f1f5f9;
        border-color: #cbd5e1;
        color: #94a3b8;
      }

      /* Aesthetic Pot */
      .pot-wrapper {
        position: relative;
        width: 260px;
        height: 180px;
        margin: 10px auto;
      }
      .pot-base {
        width: 100%;
        height: 100px;
        background: linear-gradient(145deg, #cbd5e1, #64748b);
        border: 5px solid var(--pot-border);
        border-radius: 10px 10px 120px 120px;
        position: absolute;
        bottom: 0;
        z-index: 1;
      }
      .pot-rim {
        width: 96%;
        height: 50px;
        background: #1e293b;
        border: 5px solid var(--pot-border);
        border-radius: 50%;
        position: absolute;
        top: 60px;
        left: 2%;
        z-index: 3;
        overflow: hidden;
        display: flex;
      }
      .soup-l {
        width: 50%;
        height: 100%;
        background: var(--hotpot-red);
        position: relative;
        border-right: 2px solid var(--pot-border);
      }
      .soup-r {
        width: 50%;
        height: 100%;
        background: var(--hotpot-gold);
        position: relative;
      }

      .pot-ear {
        width: 40px;
        height: 12px;
        background: var(--pot-border);
        border-radius: 20px;
        position: absolute;
        top: 100px;
        z-index: 0;
      }
      .ear-l {
        left: -15px;
      }
      .ear-r {
        right: -15px;
      }

      .steam {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
        z-index: 0;
      }
      .steam span {
        width: 15px;
        height: 15px;
        background: rgba(226, 232, 240, 0.8);
        border-radius: 50%;
        animation: steamRise 2.5s infinite ease-out;
        filter: blur(5px);
      }
      @keyframes steamRise {
        0% {
          transform: translateY(0) scale(1);
          opacity: 0;
        }
        50% {
          opacity: 0.6;
        }
        100% {
          transform: translateY(-80px) scale(2.5);
          opacity: 0;
        }
      }

      /* Improved Food Animation: Drop then Float */
      .food {
        position: absolute;
        font-size: 1.8rem;
        z-index: 10;
        animation: dropFood 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)
            forwards,
          bobbing 3s infinite ease-in-out 0.6s;
      }

      @keyframes dropFood {
        from {
          transform: translateY(-60px) scale(0);
          opacity: 0;
        }
        to {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }

      @keyframes bobbing {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-4px) rotate(5deg);
        }
      }

      .underlined {
        text-decoration: underline;
        text-underline-offset: 6px;
        color: var(--hotpot-red);
        font-weight: 800;
      }
      .writing-tag {
        border-left: 6px solid var(--hotpot-red);
        padding-left: 15px;
        margin-top: 10px;
        display: block;
        font-style: italic;
      }

      .fade-in {
        animation: fadeIn 0.4s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

      const shopItems = [
        { name: "Ba Chỉ Bò", icon: "🥩", price: 30 },
        { name: "Tôm Sú", icon: "🍤", price: 40 },
        { name: "Mực Ống", icon: "🦑", price: 35 },
        { name: "Nấm Kim", icon: "🍄", price: 15 },
        { name: "Cải Cúc", icon: "🥬", price: 10 },
        { name: "Đậu Hũ", icon: "🧊", price: 10 },
        { name: "Bắp Mỹ", icon: "🌽", price: 12 },

      let currentIdx = 0;
      let score = 0;
      let correctCount = 0;
      let inventory = [];

      function init() {
        renderQuestion();
        renderShop();
        updateUI();
      }

      function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById("question-category").innerText = q.cat;
        document.getElementById("question-count").innerText = `${(
          currentIdx + 1
        )
          .toString()
          .padStart(2, "0")} / ${questions.length}`;
        document.getElementById("question-text").innerHTML = q.q;

        const container = document.getElementById("options-container");
        container.innerHTML = "";

        if (q.cat === "Writing") {
          const inputWrap = document.createElement("div");
          inputWrap.className = "flex flex-col space-y-5";

          const input = document.createElement("input");
          input.type = "text";
          input.placeholder = "Nhập câu trả lời của bạn...";
          input.className = "writing-input";
          input.id = "write-field";

          const submit = document.createElement("button");
          submit.innerText = "GỬI ĐÁP ÁN";
          submit.className =
            "bg-red-500 text-white font-black py-4 px-10 rounded-2xl hover:bg-red-600 transition shadow-xl self-end";

          if (userAnswers.has(currentIdx)) {
            const ans = userAnswers.get(currentIdx);
            input.value = ans.userInput;
            input.disabled = true;
            submit.disabled = true;
            submit.innerText = ans.isCorrect ? "ĐÚNG RỒI! ✨" : "CHƯA ĐÚNG 🥣";
            submit.className = ans.isCorrect
              ? "bg-green-500 text-white font-black py-4 px-10 rounded-2xl self-end"
              : "bg-gray-400 text-white font-black py-4 px-10 rounded-2xl self-end";

            if (!ans.isCorrect) {
              const correctTip = document.createElement("p");
              correctTip.className = "text-red-500 font-bold mt-3 text-lg";
              correctTip.innerHTML = `Đúng phải là: <span class="italic">${q.answerKey}</span>`;
              inputWrap.appendChild(correctTip);
            }
          } else {
            submit.onclick = () => {
              const val = document.getElementById("write-field").value.trim();
              if (val) handleAnswer(val);
            };
            input.onkeydown = (e) => {
              if (e.key === "Enter") submit.click();
            };
          }

          inputWrap.prepend(input);
          inputWrap.appendChild(submit);
          container.appendChild(inputWrap);
          if (!userAnswers.has(currentIdx))
            setTimeout(() => input.focus(), 100);
        } else {
          q.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className =
              "answer-btn p-7 rounded-[35px] text-left font-bold shadow-sm flex items-center group";

            if (userAnswers.has(currentIdx)) {
              const ans = userAnswers.get(currentIdx);
              if (i === q.correct) btn.classList.add("correct");
              else if (i === ans.choice) btn.classList.add("wrong");
              btn.disabled = true;
            }

            btn.innerHTML = `
                        <span class="w-14 h-14 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mr-6 group-hover:bg-red-500 group-hover:text-white transition-colors font-black text-xl">${String.fromCharCode(
                          65 + i
                        )}</span>
                        <span class="text-gray-600 text-xl">${opt}</span>
                    `;
            btn.onclick = () => handleAnswer(i);
            container.appendChild(btn);
          });
        }

        document.getElementById("prev-btn").disabled = currentIdx === 0;
        document.getElementById("next-btn").innerHTML =
          currentIdx === questions.length - 1
            ? 'KẾT THÚC <i class="fas fa-flag-checkered ml-3"></i>'
            : 'CÂU TIẾP <i class="fas fa-arrow-right ml-3"></i>';
      }

      function handleAnswer(val) {
        if (userAnswers.has(currentIdx)) return;
        const q = questions[currentIdx];
        let isCorrect = false;
        let entry = {};

        if (q.cat === "Writing") {
          const normUser = val.toLowerCase().replace(/\s+/g, " ").trim();
          const normKey = q.answerKey.toLowerCase().replace(/\s+/g, " ").trim();
          isCorrect = normUser === normKey;
          entry = { userInput: val, isCorrect };
        } else {
          isCorrect = val === q.correct;
          entry = { choice: val, isCorrect };
        }

        userAnswers.set(currentIdx, entry);
        if (isCorrect) {
          score += 10;
          correctCount++;
          showModal("CHÍNH XÁC!", "+10 Xu! Món ngon đang chờ nhúng đó!", "✨");
        } else {
          showModal("TIẾC QUÁ!", "Cố gắng hơn ở câu tiếp theo nhé!", "🍵");
        }
        updateUI();
        renderQuestion();
      }

      function nextQuestion() {
        if (currentIdx < questions.length - 1) {
          currentIdx++;
          renderQuestion();
        } else {
          finishGame();
        }
      }

      function prevQuestion() {
        if (currentIdx > 0) {
          currentIdx--;
          renderQuestion();
        }
      }

      function renderShop() {
        const container = document.getElementById("shop-items");
        container.innerHTML = "";
        shopItems.forEach((item, i) => {
          const card = document.createElement("div");
          card.className =
            "glass-card p-6 text-center flex flex-col items-center hover:scale-105 transition-all border-2 border-transparent hover:border-red-300 cursor-pointer";
          card.innerHTML = `
                    <div class="text-6xl mb-5 transform hover:rotate-12 transition-transform">${item.icon}</div>
                    <div class="font-black text-gray-800 text-sm mb-2 uppercase tracking-tight">${item.name}</div>
                    <div class="text-red-500 font-black text-2xl mb-5">${item.price} xu</div>
                    <button onclick="buyItem(${i})" class="w-full bg-red-50 text-red-500 py-4 rounded-2xl font-black hover:bg-red-500 hover:text-white transition-all uppercase text-xs">NHÚNG LẨU</button>
                `;
          container.appendChild(card);
        });
      }

      function buyItem(idx) {
        const item = shopItems[idx];
        if (score >= item.price) {
          score -= item.price;
          inventory.push(item);

          const side = Math.random() > 0.5 ? "soup-left" : "soup-right";
          const el = document.createElement("span");
          el.className = "food";
          el.innerText = item.icon;
          el.style.left = Math.random() * 60 + 15 + "%";
          el.style.top = Math.random() * 50 + 15 + "%";
          document.getElementById(side).appendChild(el);

          updateUI();
          updatePotStatus();
          showModal("ĐÃ NHÚNG!", `Đã cho ${item.name} vào nồi!`, item.icon);
        } else {
          showModal(
            "KHÔNG ĐỦ XU!",
            "Hãy trả lời thêm câu hỏi để kiếm xu nhé!",
            "💸"
          );
        }
      }

      function updatePotStatus() {
        const status = document.getElementById("pot-status");
        const tray = document.getElementById("pot-tray");
        status.innerText = `Đã nhúng ${inventory.length} món!`;
        tray.innerHTML = inventory
          .slice(-6)
          .map(
            (it) =>
              `<span class="bg-white p-3 rounded-2xl shadow-sm border border-red-50 text-2xl">${it.icon}</span>`
          )
          .join("");
      }

      function finishGame() {
        document.getElementById("quiz-view").classList.add("hidden");
        document.getElementById("shop-view").classList.add("hidden");
        const resultView = document.getElementById("result-view");
        resultView.classList.remove("hidden");

        document.getElementById("res-score").innerText = score;
        document.getElementById(
          "res-correct"
        ).innerText = `${correctCount}/${questions.length}`;

        const potDisplay = document.getElementById("final-pot-display");
        if (potDisplay) {
          const pot = document.getElementById("active-pot").cloneNode(true);
          potDisplay.innerHTML = "";
          potDisplay.appendChild(pot);
        }
      }

      function toggleView(view) {
        if (view === "shop") {
          document.getElementById("quiz-view").classList.add("hidden");
          document.getElementById("shop-view").classList.remove("hidden");
        } else {
          document.getElementById("shop-view").classList.add("hidden");
          document.getElementById("quiz-view").classList.remove("hidden");
        }
      }

      function updateUI() {
        const display = document.getElementById("score-display");
        if (display) display.innerText = score;
      }

      function showModal(title, body, icon) {
        document.getElementById("modal-title").innerText = title;
        document.getElementById("modal-body").innerText = body;
        document.getElementById("modal-icon").innerText = icon;
        document.getElementById("modal").classList.remove("hidden");
      }

      function closeModal() {
        document.getElementById("modal").classList.add("hidden");
      }

      window.onload = init;
    </script>
  </body>
</html>
